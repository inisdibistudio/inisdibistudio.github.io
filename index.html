<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inisdibi Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .apps {
            margin-top: 2rem;
        }
        .app-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        .app-card h3 {
            color: #9945FF;
            margin-bottom: 0.5rem;
        }
        .app-card p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .contact {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        .contact a {
            color: #888;
        }
        .links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        .links a {
            color: #666;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .links a:hover {
            color: #9945FF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inisdibi Studio</h1>
        <p class="subtitle">Mobile App Development</p>

        <div class="apps">
            <div class="app-card">
                <h3>Solana Faucet</h3>
                <p>Earn free Solana tokens. Claim your rewards daily, invite friends with referral codes, and withdraw your earnings to your wallet.</p>
            </div>
        </div>

        <p class="contact">Contact: <a href="mailto:inisdibistudio@proton.me">inisdibistudio@proton.me</a></p>

        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
        </div>
    </div>
</body>
</html>
